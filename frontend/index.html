<!DOCTYPE html>
<html lang="en">
<head>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAI — Your AI Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --sidebar-bg: #111114;
    --surface: #18181c;
    --surface2: #1f1f24;
    --border: #2a2a30;
    --accent: #7c6aff;
    --accent2: #a78bfa;
    --text: #e8e8f0;
    --text-muted: #6b6b7a;
    --text-dim: #3a3a45;
    --user-bubble: #1e1b38;
    --ai-bubble: #18181c;
    --danger: #ff5f5f;
    --success: #4ade80;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    overflow: hidden;
  }

  /* SIDEBAR */
  .sidebar {
    width: 260px;
    min-width: 260px;
    background: var(--sidebar-bg);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 16px 12px;
    gap: 8px;
    transition: transform 0.3s ease;
  }

  .sidebar-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 8px 16px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 4px;
  }

  .logo {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.05em;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .new-chat-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    width: 100%;
    text-align: left;
  }

  .new-chat-btn:hover {
    background: var(--surface2);
    border-color: var(--accent);
    color: var(--accent2);
  }

  .new-chat-btn .icon {
    width: 20px;
    height: 20px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }

  .conversations-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    padding: 8px 8px 4px;
    text-transform: uppercase;
  }

  .conversations-list {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .conversations-list::-webkit-scrollbar { width: 3px; }
  .conversations-list::-webkit-scrollbar-track { background: transparent; }
  .conversations-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .conv-item {
    padding: 9px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: all 0.15s;
    border: 1px solid transparent;
    position: relative;
  }

  .conv-item:hover {
    background: var(--surface);
    color: var(--text);
  }

  .conv-item.active {
    background: var(--surface2);
    color: var(--text);
    border-color: var(--border);
  }

  .conv-item.active::before {
    content: '';
    position: absolute;
    left: 0;
    top: 20%;
    height: 60%;
    width: 2px;
    background: var(--accent);
    border-radius: 0 2px 2px 0;
  }

  /* MAIN */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  .top-bar {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--bg);
    min-height: 60px;
  }

  .top-bar .conv-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-muted);
  }

  .status-dot {
    width: 7px;
    height: 7px;
    background: var(--success);
    border-radius: 50%;
    box-shadow: 0 0 6px var(--success);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* MESSAGES */
  .messages-area {
    flex: 1;
    overflow-y: auto;
    padding: 24px 0;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .messages-area::-webkit-scrollbar { width: 4px; }
  .messages-area::-webkit-scrollbar-track { background: transparent; }
  .messages-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    gap: 16px;
    padding: 60px 24px;
    text-align: center;
    animation: fadeIn 0.5s ease;
  }

  .welcome-logo {
    font-size: 48px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent2), #c4b5fd);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.02em;
  }

  .welcome p {
    color: var(--text-muted);
    font-size: 15px;
    max-width: 340px;
    line-height: 1.6;
  }

  .message-row {
    display: flex;
    padding: 12px 24px;
    gap: 14px;
    animation: slideUp 0.25s ease;
    align-items: flex-start;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .message-row:hover { background: rgba(255,255,255,0.01); }

  .avatar {
    width: 30px;
    height: 30px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .avatar.user {
    background: linear-gradient(135deg, #3b2fa0, #6d5be0);
    color: white;
  }

  .avatar.ai {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
  }

  .message-content {
    flex: 1;
    max-width: 720px;
  }

  .message-sender {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 6px;
    color: var(--text-muted);
  }

  .message-text {
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    line-height: 1.7;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
  }

  .message-text.user-text {
    font-family: 'Syne', sans-serif;
    font-size: 15px;
  }

  /* TYPING */
  .typing-indicator {
    display: flex;
    gap: 4px;
    align-items: center;
    padding: 4px 0;
  }

  .typing-indicator span {
    width: 6px;
    height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }

  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  /* INPUT */
  .input-area {
    padding: 16px 24px 20px;
    background: var(--bg);
    border-top: 1px solid var(--border);
  }

  .input-wrapper {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 14px;
    transition: border-color 0.2s;
    max-width: 860px;
    margin: 0 auto;
  }

  .input-wrapper:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(124, 106, 255, 0.1);
  }

  #messageInput {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    resize: none;
    max-height: 160px;
    min-height: 24px;
    line-height: 1.5;
  }

  #messageInput::placeholder { color: var(--text-muted); }

  #sendBtn {
    width: 34px;
    height: 34px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 9px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
    opacity: 0.5;
  }

  #sendBtn.active {
    opacity: 1;
    transform: scale(1.05);
  }

  #sendBtn:hover.active { transform: scale(1.1); }

  #sendBtn svg { width: 16px; height: 16px; fill: white; }

  .input-hint {
    text-align: center;
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 10px;
    font-family: 'DM Mono', monospace;
  }
  .message-text pre {
    background: #0d0d0f;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    overflow-x: auto;
    margin: 8px 0;
}

  .message-text code {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: var(--accent2);
  }

  .message-text pre code {
      color: var(--text);
  }

  /* EMPTY STATE */
  .empty-conv {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    color: var(--text-dim);
    font-size: 12px;
    font-family: 'DM Mono', monospace;
  }
  .toggles {
  display: flex;
  gap: 8px;
  max-width: 860px;
  margin: 0 auto 10px;
  }

  .toggle-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .toggle-btn.on {
    background: rgba(124, 106, 255, 0.15);
    border-color: var(--accent);
    color: var(--accent2);
  }

  
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-header">
    <span class="logo">KAI</span>
    <div class="status-dot"></div>
  </div>
  <button class="new-chat-btn" onclick="startNewChat()">
    <div class="icon">+</div>
    New conversation
  </button>
  <div class="conversations-label">Recent</div>
  <div class="conversations-list" id="convList"></div>
</aside>

<main class="main">
  <div class="top-bar">
    <div class="status-dot"></div>
    <span class="conv-title" id="convTitle">Start a new conversation</span>
  </div>

  <div class="messages-area" id="messagesArea">
    <div class="welcome" id="welcomeScreen">
      <div class="welcome-logo">KAI</div>
      <p>Your personal AI assistant. Ask me anything — I remember our conversations.</p>
    </div>
  </div>

  <div class="input-area">
    <div class="toggles">
      <button class="toggle-btn" id="webToggle" onclick="toggleFeature('web')">
        🔍 Web Search
      </button>
      <button class="toggle-btn" id="deepToggle" onclick="toggleFeature('deep')">
        🔬 Deep Research
      </button>
    </div>
    <div class="input-wrapper">
      <textarea id="messageInput" placeholder="Message KAI..." rows="1"
        oninput="autoResize(this); toggleSend()"
        onkeydown="handleKey(event)"></textarea>
      <button id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
    <div class="input-hint">Enter to send · Shift+Enter for new line</div>
  </div>
</main>

<script>
  const API = 'http://localhost:8000';
  let currentConvId = null;
  let isTyping = false;
  let webSearchOn = false;
  let deepResearchOn = false;

  function toggleFeature(type) {
    if (type === 'web') {
      webSearchOn = !webSearchOn;
      document.getElementById('webToggle').classList.toggle('on', webSearchOn);
    } else {
      deepResearchOn = !deepResearchOn;
      document.getElementById('deepToggle').classList.toggle('on', deepResearchOn);
    }
  }

  // ── Init ──────────────────────────────────────────────
  async function init() {
    await loadConversations();
  }

  // ── Load sidebar conversations ────────────────────────
  async function loadConversations() {
    try {
      const res = await fetch(`${API}/conversations`);
      const convs = await res.json();
      const list = document.getElementById('convList');
      list.innerHTML = '';

      if (convs.length === 0) {
        list.innerHTML = '<div class="empty-conv">No conversations yet</div>';
        return;
      }

      convs.forEach(c => {
        const el = document.createElement('div');
        el.className = 'conv-item' + (c.id === currentConvId ? ' active' : '');
        el.textContent = c.title || 'New Chat';
        el.dataset.id = c.id;
        el.onclick = () => loadConversation(c.id, c.title);
        list.appendChild(el);
      });
    } catch (e) {
      console.error('Failed to load conversations:', e);
    }
  }

  // ── Load a conversation's messages ───────────────────
  async function loadConversation(id, title) {
    currentConvId = id;
    document.getElementById('convTitle').textContent = title || 'New Chat';

    const area = document.getElementById('messagesArea');
    area.innerHTML = '';

    try {
      const res = await fetch(`${API}/conversation/${id}`);
      const messages = await res.json();

      if (messages.length === 0) {
        area.innerHTML = '<div class="empty-conv">No messages yet — say something!</div>';
      } else {
        messages.forEach(m => appendMessage(m.role, m.content));
      }
    } catch (e) {
      console.error('Failed to load conversation:', e);
    }

    await loadConversations();
    scrollToBottom();
  }

  // ── Start new chat ────────────────────────────────────
  async function startNewChat() {
    try {
      const res = await fetch(`${API}/conversation`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title: 'New Chat' })
      });
      const conv = await res.json();
      currentConvId = conv.id;
      document.getElementById('convTitle').textContent = 'New Chat';
      document.getElementById('messagesArea').innerHTML =
        '<div class="empty-conv">New conversation started — say something!</div>';
      await loadConversations();
    } catch (e) {
      console.error('Failed to create conversation:', e);
    }
  }

  // ── Send message ──────────────────────────────────────
  async function sendMessage() {
    const input = document.getElementById('messageInput');
    const text = input.value.trim();
    if (!text || isTyping) return;

    if (!currentConvId) {
      await startNewChat();
    }

    // Clear welcome screen
    const welcome = document.getElementById('welcomeScreen');
    if (welcome) welcome.remove();
    const emptyConv = document.querySelector('.empty-conv');
    if (emptyConv) emptyConv.remove();

    // Show user message
    appendMessage('user', text);
    input.value = '';
    input.style.height = 'auto';
    toggleSend();

    // Show typing indicator
    showTyping();
    isTyping = true;

    try {
      const res = await fetch(`${API}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          conversation_id: currentConvId, 
          message: text,
          web_search: webSearchOn,
          deep_search: deepResearchOn})
      });
      const data = await res.json();
      removeTyping();
      appendMessage('assistant', data.content);
    } catch (e) {
      removeTyping();
      appendMessage('assistant', '⚠️ Something went wrong. Please try again.');
    }

    isTyping = false;
    scrollToBottom();
    await loadConversations();
  }

  // ── Append message to UI ──────────────────────────────
  function appendMessage(role, content) {
    const area = document.getElementById('messagesArea');
    const row = document.createElement('div');
    row.className = 'message-row';

    const isUser = role === 'user';
    row.innerHTML = `
      <div class="avatar ${isUser ? 'user' : 'ai'}">${isUser ? 'U' : 'K'}</div>
      <div class="message-content">
        <div class="message-sender">${isUser ? 'You' : 'KAI'}</div>
        <div class="message-text ${isUser ? 'user-text' : ''}">${isUser ? escapeHtml(content) : marked.parse(content)}</div>
      </div>
    `;
    area.appendChild(row);
    scrollToBottom();
  }

  // ── Typing indicator ──────────────────────────────────
  function showTyping() {
    const area = document.getElementById('messagesArea');
    const row = document.createElement('div');
    row.className = 'message-row';
    row.id = 'typingRow';
    row.innerHTML = `
      <div class="avatar ai">K</div>
      <div class="message-content">
        <div class="message-sender">KAI</div>
        <div class="typing-indicator"><span></span><span></span><span></span></div>
      </div>
    `;
    area.appendChild(row);
    scrollToBottom();
  }

  function removeTyping() {
    const t = document.getElementById('typingRow');
    if (t) t.remove();
  }

  // ── Helpers ───────────────────────────────────────────
  function escapeHtml(text) {
    return text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  function scrollToBottom() {
    const area = document.getElementById('messagesArea');
    area.scrollTop = area.scrollHeight;
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 160) + 'px';
  }

  function toggleSend() {
    const val = document.getElementById('messageInput').value.trim();
    const btn = document.getElementById('sendBtn');
    btn.classList.toggle('active', val.length > 0);
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  init();
</script>
</body>
</html>
